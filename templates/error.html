{% extends "base.html" %}

{% block title %}Error - Fake News Detector{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="card shadow-lg">
                <div class="card-body py-5">
                    <i class="fas fa-exclamation-triangle text-warning" style="font-size: 80px;"></i>
                    <h2 class="mt-4">Oops! Something went wrong</h2>
                    <p class="text-muted">{{ error }}</p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg mt-3">
                        <i class="fas fa-home me-2"></i>Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
